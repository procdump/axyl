[package]
name = "rayls-network"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license = "BUSL-1.1"
homepage.workspace = true
repository.workspace = true
authors.workspace = true
description.workspace = true
exclude.workspace = true

[dependencies]
rpassword = { workspace = true }
rayls-execution-faucet = { workspace = true, optional = true }
clap = { workspace = true }
rayls-network-cli = { workspace = true }
rayls-middleware-orchestrator = { workspace = true }

[target.'cfg(not(target_env = "msvc"))'.dependencies]
tikv-jemallocator = { version = "0.6", features = ["profiling"], optional = true }

[features]
default = ["jemalloc"]
faucet = ["rayls-execution-faucet"]
jemalloc = ["tikv-jemallocator"]
# Local single-node development mode (`dev` subcommand + `node --dev`). NOT FOR
# PRODUCTION — off by default so release builds exclude it; build with
# `--features dev-single-node-setup` for local development.
dev-single-node-setup = ["rayls-network-cli/dev-single-node-setup"]

[lints]
workspace = true

[profile.profiling]
inherits = "release"
debug = true