name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Feature requests are most useful when they describe a concrete problem and a proposed solution, not just an idea.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use-case or limitation that motivated this request. If applicable, link to the issue / PR that surfaced it.
      placeholder: When I try to do X, I currently have to ... which is painful because ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A clear description of what you want to happen. Sketches, API surfaces, or example commands welcome.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Which surface area does this affect?
      multiple: true
      options:
        - Consensus protocol
        - Execution / EVM
        - Networking (libp2p, peer manager)
        - JSON-RPC (eth_* / rayls_*)
        - On-chain contracts (ConsensusRegistry, FeeAggregator, RewardDistributor, etc.)
        - Operations / scripts (etc/)
        - Documentation
        - CI / build
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you think about, and why did you discard them?
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Related upstream issues, links to peer implementations, expected breaking changes, migration concerns.
    validations:
      required: false
