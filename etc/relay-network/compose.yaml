  # --- observers: dial-out-only followers on the public network. They reach the committee
  # --- exclusively through the relays, give the host RPC endpoints, and are the network's tx
  # --- ingestion points. Addressed by DNS via the dns service: observerN.rayls.test per node plus
  # --- a round-robin rpc.rayls.test spanning both. --------------------------------------------
  observer1:
    <<: *observer-common
    environment:
      # network=debug surfaces the connection-path classification and per-request via-path
      # tracing that proves every peer flow transits a relay circuit (never a direct link).
      - RUST_LOG=info,network=debug
      - RL_BLS_PASSPHRASE=local
      - RAYLS_NETWORK=local
      - RAYLS_DNS_SERVER=10.20.0.53:53
      # Observers MUST listen on 0.0.0.0, not their node-info default of 127.0.0.1: libp2p-quic
      # reuses the listening socket for outbound dials (port_use Reuse), and a loopback-bound
      # socket cannot reach the relays -- dials then time out silently. (Validators are immune:
      # in relay mode they have no direct QUIC listener, so dials use ephemeral sockets.)
      - PRIMARY_LISTENER_MULTIADDR=/ip4/0.0.0.0/udp/49590/quic-v1
      - WORKER_LISTENER_MULTIADDR=/ip4/0.0.0.0/udp/49595/quic-v1
    command: >
      /usr/local/bin/rayls node --observer --datadir /home/nonroot/data --metrics 127.0.0.1:9101
      --log.stdout.format terminal -vvvv --full --storage.v2
      --txpool.pending-max-count 1000000 --txpool.pending-max-size 20971120000
      --txpool.basefee-max-count 1000000 --txpool.basefee-max-size 20971120000
      --txpool.queued-max-count 1000000 --txpool.queued-max-size 20971120000
      --txpool.max-pending-txns 1000000 --txpool.max-new-txns 1000000
      --txpool.minimal-protocol-fee 0 --txpool.max-tx-input-bytes 999999999999
      --txpool.max-account-slots 1000000 --gpo.default-suggested-fee 0
      --http --http.addr 0.0.0.0 --http.api all
    ports:
      - 7545:8545
    volumes:
      - observer1-data:/home/nonroot/data
    networks:
      public:
        ipv4_address: 10.20.0.21
  observer2:
    <<: *observer-common
    environment:
      # network=debug surfaces the connection-path classification and per-request via-path
      # tracing that proves every peer flow transits a relay circuit (never a direct link).
      - RUST_LOG=info,network=debug
      - RL_BLS_PASSPHRASE=local
      - RAYLS_NETWORK=local
      - RAYLS_DNS_SERVER=10.20.0.53:53
      - PRIMARY_LISTENER_MULTIADDR=/ip4/0.0.0.0/udp/49590/quic-v1
      - WORKER_LISTENER_MULTIADDR=/ip4/0.0.0.0/udp/49595/quic-v1
    command: >
      /usr/local/bin/rayls node --observer --datadir /home/nonroot/data --metrics 127.0.0.1:9101
      --log.stdout.format terminal -vvvv --full --storage.v2
      --txpool.pending-max-count 1000000 --txpool.pending-max-size 20971120000
      --txpool.basefee-max-count 1000000 --txpool.basefee-max-size 20971120000
      --txpool.queued-max-count 1000000 --txpool.queued-max-size 20971120000
      --txpool.max-pending-txns 1000000 --txpool.max-new-txns 1000000
      --txpool.minimal-protocol-fee 0 --txpool.max-tx-input-bytes 999999999999
      --txpool.max-account-slots 1000000 --gpo.default-suggested-fee 0
      --http --http.addr 0.0.0.0 --http.api all
    ports:
      - 7544:8545
    volumes:
      - observer2-data:/home/nonroot/data
    networks:
      public:
        ipv4_address: 10.20.0.22

volumes:
  validator1-data:
  validator2-data:
  validator3-data:
  validator4-data:
  observer1-data:
  observer2-data:
  sharedgenesisdir:

networks:
  # One "private VPC" per validator. NOTE: deliberately NOT `internal: true`. Docker's `internal`
  # drops a container's egress to anything outside its own subnet BEFORE it reaches a gateway.
  # OrbStack ignores that (it routes between bridges), but Docker Desktop enforces it strictly - so
  # on Docker Desktop an `internal` VPC stops a validator from reaching FOREIGN relays through its
  # own relay (the circuit first hops), and consensus never forms. Isolation is not the network's
  # job here: it is enforced by the in-container firewalls (validator OUTPUT/INPUT DROP + relay
  # FORWARD DROP/MASQUERADE) plus Docker's per-bridge isolation. That is also the honest production
  # model - a cloud VPC permits egress via a NAT gateway while security groups do the isolating -
  # and it behaves identically on OrbStack and Docker Desktop.
  vpc1:
    ipam:
      config:
        - subnet: 10.10.1.0/24
  vpc2:
    ipam:
      config:
        - subnet: 10.10.2.0/24
  vpc3:
    ipam:
      config:
        - subnet: 10.10.3.0/24
  vpc4:
    ipam:
      config:
        - subnet: 10.10.4.0/24
  # the simulated public internet: relay public legs, dns, observers
  public:
    ipam:
      config:
        - subnet: 10.20.0.0/24
